<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central PlayBar | QG Mestre</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 30px;
        }

        /* HEADER */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color);
        }
        .brand { font-size: 1.6rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .brand i { color: var(--primary); }
        .btn-logout {
            background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--danger);
            padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* KPIs */
        .kpi-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px;
            padding: 20px; display: flex; flex-direction: column; gap: 8px;
        }
        .kpi-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .kpi-value { font-size: 2rem; font-weight: 700; color: var(--text-main); }
        
        .kpi-card:nth-child(1) .kpi-value { color: var(--primary); }
        .kpi-card:nth-child(2) .kpi-value { color: var(--success); }
        .kpi-card:nth-child(3) .kpi-value { color: var(--warning); }

        /* LAYOUT PRINCIPAL */
        .layout-grid {
            display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start;
        }
        .panel {
            background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px;
        }
        .panel-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* FORMULÁRIO */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
        .form-control {
            width: 100%; background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 10px 12px; border-radius: 6px; font-size: 0.95rem; outline: none;
        }
        .form-control:focus { border-color: var(--primary); }
        .form-control:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-submit {
            width: 100%; background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--primary-hover); }
        .btn-cancel {
            width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px;
            border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 8px; display: none;
        }

        /* TABELA PROFISSIONAL */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        th { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; background: rgba(0,0,0,0.2); }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Indicador Online/Offline */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-dot.offline { background: var(--gray); }

        .td-bar-name { font-weight: 600; font-size: 1.05rem; display: flex; flex-direction: column; gap: 4px; }
        .td-bar-name-top { display: flex; align-items: center; }
        .td-bar-id { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; padding-left: 18px; }
        
        .status-badge {
            padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .bg-success { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .bg-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }

        /* BOTOES DE AÇÃO DA TABELA */
        .action-flex { display: flex; gap: 6px; }
        .btn-sm {
            width: 32px; height: 32px; border: none; border-radius: 4px; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .btn-sm:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        .btn-wa { background-color: #25D366; }
        .btn-edit { background-color: var(--primary); }
        .btn-delete { background-color: var(--gray); }
        .btn-lock { background-color: var(--danger); }
        .btn-unlock { background-color: var(--success); }
        .btn-trust { background-color: var(--warning); }

        @media (max-width: 1024px) {
            .layout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand"><i class="fa-solid fa-server"></i> Central PlayBar Mestre</div>
        <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </header>

    <div class="kpi-container">
        <div class="kpi-card">
            <span class="kpi-title">Bares Ativos</span>
            <span class="kpi-value" id="kpi-ativos">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-title">Faturamento Mensal Fixo</span>
            <span class="kpi-value" id="kpi-faturamento">R$ 0,00</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-title">Receita Diária (Fichas)</span>
            <span class="kpi-value" id="kpi-diario">R$ 0,00</span>
        </div>
    </div>

    <div class="layout-grid">
        
        <!-- PAINEL LATERAL - FORMULÁRIO -->
        <aside class="panel">
            <div class="panel-title" id="form-title">Cadastrar Novo Bar</div>
            <form id="clientForm">
                <div class="form-group">
                    <label class="form-label">ID do Sistema</label>
                    <input type="text" id="cli_id" class="form-control" placeholder="Ex: bar_centro" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nome Fantasia</label>
                    <input type="text" id="cli_name" class="form-control" placeholder="Ex: Espetinho do Zé" required>
                </div>
                <div class="form-group">
                    <label class="form-label">WhatsApp (DDD + Número)</label>
                    <input type="text" id="cli_phone" class="form-control" placeholder="Ex: 69999999999">
                </div>
                <div class="form-group">
                    <label class="form-label">Data de Vencimento</label>
                    <input type="date" id="cli_date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mensalidade (R$)</label>
                    <input type="number" step="0.01" id="cli_value" class="form-control" placeholder="0.00" required>
                </div>
                
                <button type="submit" id="btn-submit-form" class="btn-submit">Salvar Cadastro</button>
                <button type="button" id="btn-cancel-edit" class="btn-cancel" onclick="cancelEdit()">Cancelar Edição</button>
            </form>
        </aside>

        <!-- PAINEL PRINCIPAL - TABELA DE DADOS -->
        <main class="panel">
            <div class="panel-title">
                Bares Conectados
                <button onclick="loadClients()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:1.2rem;" title="Atualizar Dados">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Estabelecimento</th>
                            <th>Mensalidade</th>
                            <th>Vencimento</th>
                            <th>Status</th>
                            <th>Ações Administrativas</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">Carregando dados do servidor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let editMode = false;

        function formatDateBR(dateString) {
            if (!dateString) return '--/--/----';
            const [y, m, d] = dateString.split('-');
            return `${d}/${m}/${y}`;
        }

        async function loadClients() {
            try {
                const res = await fetch('/api/clients');
                const clients = await res.json();
                
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                
                let kpiAtivos = 0, kpiFaturamento = 0, kpiDiario = 0;

                if (clients.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">Nenhum estabelecimento cadastrado.</td></tr>`;
                    return;
                }

                clients.forEach(client => {
                    const isBlocked = !client.active;
                    
                    if (!isBlocked) kpiAtivos++;
                    kpiFaturamento += (client.value || 0);
                    kpiDiario += (client.dailyRevenue || 0);

                    // Lógica para bolinha Online/Offline (5 minutos de tolerância)
                    const lastSeenTime = new Date(client.lastSeen).getTime();
                    const isOnline = (Date.now() - lastSeenTime) < 5 * 60 * 1000;
                    const statusDot = isOnline 
                        ? `<span class="status-dot online" title="Online (Player ativo agora)"></span>` 
                        : `<span class="status-dot offline" title="Offline (Player fechado)"></span>`;

                    // Criação dos botões baseados no status
                    let toggleBtn = isBlocked 
                        ? `<button class="btn-sm btn-unlock" onclick="toggleStatus('${client.client_id}', true)" title="Liberar Sinal"><i class="fa-solid fa-lock-open"></i></button>
                           <button class="btn-sm btn-trust" onclick="trustUnlock('${client.client_id}')" title="Desbloqueio Confiança 24h"><i class="fa-solid fa-handshake"></i></button>` 
                        : `<button class="btn-sm btn-lock" onclick="toggleStatus('${client.client_id}', false)" title="Bloquear Sinal"><i class="fa-solid fa-lock"></i></button>`;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div class="td-bar-name">
                                <div class="td-bar-name-top">
                                    ${statusDot} ${client.name || client.client_id}
                                </div>
                                <span class="td-bar-id"><i class="fa-solid fa-fingerprint" style="font-size:0.7rem; color:var(--text-muted)"></i> ${client.client_id}</span>
                            </div>
                        </td>
                        <td style="font-weight: 600;">R$ ${(client.value || 0).toFixed(2).replace('.', ',')}</td>
                        <td style="font-weight: 600; color: ${isBlocked ? 'var(--danger)' : 'var(--text-main)'}">${formatDateBR(client.dueDate)}</td>
                        <td>
                            <span class="status-badge ${isBlocked ? 'bg-danger' : 'bg-success'}">${isBlocked ? 'Bloqueado' : 'Ativo'}</span>
                        </td>
                        <td>
                            <div class="action-flex">
                                ${toggleBtn}
                                <a href="https://wa.me/55${client.phone}" target="_blank" class="btn-sm btn-wa" title="Chamar no WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
                                <button class="btn-sm btn-edit" onclick="startEdit('${client.client_id}', '${client.name || ''}', '${client.phone || ''}', '${client.dueDate}', ${client.value})" title="Editar Dados"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn-sm btn-delete" onclick="deleteClient('${client.client_id}')" title="Excluir Bar"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Atualiza Painéis Superiores
                document.getElementById('kpi-ativos').innerText = kpiAtivos;
                document.getElementById('kpi-faturamento').innerText = `R$ ${kpiFaturamento.toFixed(2).replace('.', ',')}`;
                document.getElementById('kpi-diario').innerText = `R$ ${kpiDiario.toFixed(2).replace('.', ',')}`;

            } catch (error) {
                console.error("Erro ao carregar lista:", error);
            }
        }

        // ====== FUNÇÕES DE FORMULÁRIO (CRIAR E EDITAR) ======
        document.getElementById('clientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const clientId = document.getElementById('cli_id').value;
            const data = {
                client_id: clientId,
                name: document.getElementById('cli_name').value,
                phone: document.getElementById('cli_phone').value,
                dueDate: document.getElementById('cli_date').value,
                value: document.getElementById('cli_value').value
            };

            const url = editMode ? `/api/clients/${clientId}` : '/api/register';
            const method = editMode ? 'PUT' : 'POST';

            if(!editMode) data.active = true;

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                cancelEdit(); 
                loadClients();
            } else {
                alert('Erro ao processar requisição. Verifique se o ID já existe.');
            }
        });

        window.startEdit = function(id, name, phone, date, value) {
            editMode = true;
            document.getElementById('form-title').innerText = "Editando Cadastro";
            document.getElementById('btn-submit-form').innerText = "Salvar Alterações";
            document.getElementById('btn-cancel-edit').style.display = "block";
            
            document.getElementById('cli_id').value = id;
            document.getElementById('cli_id').disabled = true; 
            document.getElementById('cli_name').value = name !== 'undefined' ? name : '';
            document.getElementById('cli_phone').value = phone !== 'undefined' ? phone : '';
            document.getElementById('cli_date').value = date;
            document.getElementById('cli_value').value = value;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.cancelEdit = function() {
            editMode = false;
            document.getElementById('form-title').innerText = "Cadastrar Novo Bar";
            document.getElementById('btn-submit-form').innerText = "Salvar Cadastro";
            document.getElementById('btn-cancel-edit').style.display = "none";
            
            document.getElementById('clientForm').reset();
            document.getElementById('cli_id').disabled = false;
        }

        // ====== FUNÇÕES ADMINISTRATIVAS ======
        window.toggleStatus = async function(client_id, makeActive) {
            if(confirm(`Deseja ${makeActive ? 'LIBERAR' : 'BLOQUEAR'} o sinal deste estabelecimento?`)) {
                await fetch('/api/toggle-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id, active: makeActive })
                });
                loadClients();
            }
        }

        window.trustUnlock = async function(client_id) {
            if(confirm('Liberar o sistema provisoriamente por 24 horas?')) {
                await fetch('/api/trust-unlock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id, hours: 24 })
                });
                loadClients();
            }
        }

        window.deleteClient = async function(client_id) {
            if(confirm('Atenção: Tem certeza que deseja EXCLUIR DEFINITIVAMENTE este bar do banco de dados?')) {
                await fetch(`/api/clients/${client_id}`, { method: 'DELETE' });
                loadClients();
            }
        }

        // ====== LOGOUT ======
        window.logout = function() {
            if(confirm('Deseja realmente sair do painel?')) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = '/'; 
            }
        }

        // Inicializa sistema
        window.onload = loadClients;
    </script>
</body>
</html>
