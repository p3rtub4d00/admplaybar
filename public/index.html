<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central PlayBar | QG Mestre</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
        }

        /* HEADER */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand i { -webkit-text-fill-color: #38bdf8; }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; gap: 8px; align-items: center;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        /* KPIs */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .kpi-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        }
        .kpi-card.blue::before { background: var(--primary); }
        .kpi-card.green::before { background: var(--success); }
        .kpi-card.orange::before { background: var(--warning); }

        .kpi-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; }
        .kpi-value { font-size: 2.5rem; font-weight: 700; }

        /* MAIN LAYOUT */
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .panel-header {
            font-size: 1.2rem; font-weight: 600; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }

        /* FORMULÁRIO */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
        
        .form-control {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2); }
        
        .btn-submit {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer;
            transition: background 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--primary-hover); }

        /* LISTA DE BARES */
        .client-list { display: flex; flex-direction: column; gap: 12px; }
        
        .client-card {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border 0.3s;
        }
        
        .client-card:hover { border-color: #475569; }
        
        /* Estilo sutil para linha bloqueada */
        .client-card.blocked { border-left: 4px solid var(--danger); background: rgba(239, 68, 68, 0.03); }

        .client-info h3 { font-size: 1.1rem; font-weight: 600; color: var(--primary); margin-bottom: 4px; }
        .client-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        .client-finance { text-align: center; font-size: 0.9rem; }
        .client-finance span { display: block; font-weight: 600; font-size: 1.1rem; color: var(--text-main); }
        .client-finance small { color: var(--text-muted); font-size: 0.8rem; }
        
        .date-danger { color: var(--danger) !important; font-weight: 600; }

        .badge {
            padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge.danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }

        /* ACTION BAR ELEGANTE */
        .action-bar { display: flex; gap: 8px; }
        .btn-action {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-action:hover.a-unlock { background: var(--success); color: white; border-color: var(--success); }
        .btn-action:hover.a-trust { background: var(--warning); color: white; border-color: var(--warning); }
        .btn-action:hover.a-qr { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-action:hover.a-wa { background: #25D366; color: white; border-color: #25D366; }
        .btn-action:hover.a-edit { background: var(--primary-hover); color: white; border-color: var(--primary-hover); }
        .btn-action:hover.a-del { background: var(--danger); color: white; border-color: var(--danger); }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .client-card { flex-direction: column; align-items: flex-start; gap: 16px; }
            .action-bar { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <i class="fa-solid fa-tower-broadcast"></i> Central PlayBar | QG
        </div>
        <button class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </header>

    <div class="kpi-grid">
        <div class="kpi-card blue">
            <div class="kpi-title">Clientes Ativos</div>
            <div class="kpi-value">0</div>
        </div>
        <div class="kpi-card green">
            <div class="kpi-title">Faturamento Fixo (Previsto)</div>
            <div class="kpi-value">R$ 2,00</div>
        </div>
        <div class="kpi-card orange">
            <div class="kpi-title">Comissão Variável (Hoje)</div>
            <div class="kpi-value">R$ 0,00</div>
        </div>
    </div>

    <div class="main-grid">
        
        <!-- SIDEBAR - CADASTRO -->
        <aside class="panel">
            <div class="panel-header">
                <i class="fa-solid fa-store"></i> Novo Bar / Cliente
            </div>
            <form id="newClientForm">
                <div class="form-group">
                    <label class="form-label">ID Único do Bar</label>
                    <input type="text" class="form-control" placeholder="Ex: bar_123">
                </div>
                <div class="form-group">
                    <label class="form-label">Nome do Estabelecimento</label>
                    <input type="text" class="form-control" placeholder="Ex: Boteco do João">
                </div>
                <div class="form-group">
                    <label class="form-label">WhatsApp (Com DDD)</label>
                    <input type="text" class="form-control" placeholder="Ex: 69999999999">
                </div>
                <div class="form-group">
                    <label class="form-label">Modelo de Contrato</label>
                    <select class="form-control">
                        <option>Aluguel Mensal (Fixo)</option>
                        <option>Porcentagem (%)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Valor (R$)</label>
                    <input type="number" class="form-control" placeholder="Ex: 99.90">
                </div>
                <button type="button" class="btn-submit">Cadastrar Bar</button>
            </form>
        </aside>

        <!-- MAIN - LISTA DE BARES -->
        <main class="panel">
            <div class="panel-header">
                <i class="fa-solid fa-network-wired"></i> Bares Conectados
            </div>
            
            <div class="client-list">
                
                <!-- EXEMPLO DE ITEM (Baseado no seu print) -->
                <div class="client-card blocked">
                    <div class="client-info">
                        <h3>playbar</h3>
                        <div class="client-meta">
                            <span class="status-dot online"></span> Online | ID: playbarteste
                        </div>
                    </div>
                    
                    <div class="client-finance">
                        <small>Mensalidade</small>
                        <span>R$ 2,00</span>
                    </div>

                    <div class="client-finance">
                        <small>Vencimento</small>
                        <span class="date-danger">23/07/2026</span>
                    </div>

                    <div>
                        <span class="badge danger">Bloqueado</span>
                    </div>

                    <div class="action-bar">
                        <button class="btn-action a-unlock" title="Desbloquear Manual"><i class="fa-solid fa-lock-open"></i></button>
                        <button class="btn-action a-trust" title="Desbloqueio de Confiança"><i class="fa-solid fa-handshake"></i></button>
                        <button class="btn-action a-qr" title="Gerar PIX"><i class="fa-solid fa-qrcode"></i></button>
                        <button class="btn-action a-wa" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></button>
                        <button class="btn-action a-edit" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="btn-action a-del" title="Excluir"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
                <!-- FIM DO ITEM -->

            </div>
        </main>
    </div>

</body>
</html>
