<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayBar Mestre | QG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .header h1 { color: #3b82f6; display: flex; align-items: center; gap: 10px; }
        
        /* Dashboard */
        .dashboard { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .dash-card { flex: 1; background-color: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-left: 4px solid #3b82f6; min-width: 200px; }
        .dash-card h4 { color: #94a3b8; font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; }
        .dash-card h2 { font-size: 2rem; color: white; }

        .container { display: flex; gap: 30px; flex-wrap: wrap; }
        .card { background-color: #1e293b; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-section { flex: 1; min-width: 300px; max-width: 350px; height: fit-content; }
        .table-section { flex: 2; min-width: 500px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background-color: #0f172a; color: white; outline: none; }
        input:focus, select:focus { border-color: #3b82f6; }
        
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1rem; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 15px 12px; border-bottom: 1px solid #334155; vertical-align: middle; transition: background 0.3s; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-active { background-color: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-blocked { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-trust { background-color: rgba(249, 115, 22, 0.2); color: #f97316; } /* Laranja para Confiança */
        
        .action-btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 0.9rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-block { background-color: #ef4444; } .btn-unblock { background-color: #10b981; }
        .btn-trust { background-color: #f97316; } .btn-trust:hover { background-color: #ea580c; }
        .btn-edit { background-color: #eab308; color: black; }
        .btn-wpp { background-color: #25D366; }
        .btn-delete { background-color: #374151; }
        
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: #1e293b; padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginOverlay" class="overlay" style="display: flex;">
        <div class="modal" style="text-align: center;">
            <h2 style="color: #3b82f6; margin-bottom: 25px;"><i class="fas fa-server"></i> PlayBar QG</h2>
            <input type="password" id="masterPassword" placeholder="Senha Mestra" style="margin-bottom: 15px;">
            <button onclick="login()" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <p id="loginError" style="color: #ef4444; margin-top: 15px; display: none;">Senha incorreta!</p>
        </div>
    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="editOverlay" class="overlay">
        <div class="modal">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-edit"></i> Editar Bar</h2>
            <input type="hidden" id="edit_id">
            <div class="form-group"><label>Nome</label><input type="text" id="edit_name"></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="edit_phone"></div>
            <div class="form-group">
                <label>Modelo</label>
                <select id="edit_model">
                    <option value="Aluguel Mensal (Fixo)">Aluguel Mensal (Fixo)</option>
                    <option value="Percentagem (Variável)">Percentagem (Variável)</option>
                </select>
            </div>
            <div class="form-group"><label>Valor / %</label><input type="number" id="edit_value"></div>
            <div class="form-group"><label>Vencimento</label><input type="date" id="edit_dueDate"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="closeEdit()" class="btn" style="background:#374151; color:white;">Cancelar</button>
                <button onclick="saveEdit()" class="btn btn-primary">Salvar</button>
            </div>
        </div>
    </div>

    <!-- CABEÇALHO E DASHBOARD -->
    <div class="header">
        <h1><i class="fas fa-server"></i> PlayBar Mestre</h1>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <h4>Bares Ativos</h4>
            <h2 id="dash-active">0</h2>
        </div>
        <div class="dash-card" style="border-color: #10b981;">
            <h4>Receita Fixa (Mensalidades)</h4>
            <h2 id="dash-fixed">R$ 0</h2>
        </div>
        <div class="dash-card" style="border-color: #eab308;">
            <h4>Receita Variável (Hoje)</h4>
            <h2 id="dash-var">R$ 0</h2>
        </div>
    </div>

    <div class="container">
        <!-- FORMULÁRIO -->
        <div class="card form-section">
            <h2 style="margin-bottom: 20px; font-size: 1.3rem;"><i class="fas fa-plus"></i> Novo Cliente</h2>
            <form id="registerForm" onsubmit="registerClient(event)">
                <div class="form-group"><label>ID (Sem espaços)</label><input type="text" id="client_id" required></div>
                <div class="form-group"><label>Nome do Bar</label><input type="text" id="name" required></div>
                <div class="form-group"><label>WhatsApp (Com DDD)</label><input type="text" id="phone" placeholder="Ex: 69999999999"></div>
                <div class="form-group">
                    <label>Modelo</label>
                    <select id="model">
                        <option value="Aluguel Mensal (Fixo)">Aluguel Mensal (Fixo)</option>
                        <option value="Percentagem (Variável)">Percentagem (Variável)</option>
                    </select>
                </div>
                <div class="form-group"><label>Valor (R$) ou %</label><input type="number" id="value" required></div>
                <div class="form-group"><label>Vencimento</label><input type="date" id="dueDate" required></div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Registar</button>
            </form>
        </div>

        <!-- TABELA -->
        <div class="card table-section">
            <h2 style="margin-bottom: 20px; font-size: 1.3rem;"><i class="fas fa-list"></i> Bares Cadastrados</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nome & Status</th>
                            <th>Financeiro</th>
                            <th>Vencimento</th>
                            <th>Estado</th>
                            <th>Ações Rápidas</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTable">
                        <tr><td colspan="5" style="text-align:center;">A carregar...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const MINHA_CHAVE_PIX = "Seu-Telefone-ou-CPF-Aqui"; 

        window.onload = () => {
            if (sessionStorage.getItem('playbar_logged') === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
                loadClients();
            }
        };

        // Permite logar com a tecla Enter
        document.getElementById('masterPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        async function login() {
            const pass = document.getElementById('masterPassword').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                document.getElementById('loginOverlay').style.display = 'none';
                sessionStorage.setItem('playbar_logged', 'true');
                loadClients();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function loadClients() {
            const res = await fetch('/api/clients');
            const clients = await res.json();
            renderClients(clients);
        }

        function renderClients(clients) {
            const tbody = document.getElementById('clientsTable');
            tbody.innerHTML = '';
            
            let totalActive = 0, totalFixed = 0, totalVar = 0;
            const now = new Date();

            clients.forEach(client => {
                
                // Verifica Desbloqueio de Confiança
                const hasTrustUnlock = client.trustUnlockUntil && new Date(client.trustUnlockUntil) > now;
                const isEffectiveActive = client.active || hasTrustUnlock;

                // Dashboard Info
                if (isEffectiveActive) totalActive++;
                if (client.model.includes('Fixo')) {
                    totalFixed += client.value;
                } else {
                    totalVar += (client.dailyRevenue || 0) * (client.value / 100);
                }

                // Cálculo de Vencimento
                const today = new Date();
                today.setHours(0,0,0,0);
                const [y, m, d] = client.dueDate.split('-');
                const dueDate = new Date(y, m - 1, d);
                const diffDays = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));

                let rowStyle = '';
                let dateColor = '#e2e8f0';
                
                if (diffDays < 0 && !isEffectiveActive) {
                    rowStyle = 'background-color: rgba(239, 68, 68, 0.15);'; // Vencido/Bloqueado
                    dateColor = '#ef4444';
                } else if (hasTrustUnlock) {
                    rowStyle = 'background-color: rgba(249, 115, 22, 0.10);'; // Confiança
                    dateColor = '#f97316';
                } else if (diffDays <= 3) {
                    rowStyle = 'background-color: rgba(234, 179, 8, 0.15);'; // Perto de vencer
                    dateColor = '#eab308';
                }

                const dateStr = `${d}/${m}/${y}`;
                const isOnline = client.lastSeen && (new Date() - new Date(client.lastSeen)) < 15 * 60 * 1000;
                const dotColor = isOnline ? '#10b981' : '#64748b';
                const statusText = isOnline ? 'Online' : 'Offline';

                let financeText = client.model.includes('Fixo') 
                    ? `<span style="color:#94a3b8;">Mensalidade:</span> <b style="font-size:1.1rem;">R$ ${client.value}</b>` 
                    : `<span style="color:#94a3b8;">(${client.value}%) Hoje:</span> R$ ${client.dailyRevenue || 0}<br><span style="color:#10b981; font-weight:bold;">Sua parte: R$ ${((client.dailyRevenue || 0) * (client.value / 100)).toFixed(2)}</span>`;

                // Badge de Status e Botões de Ação Dinâmicos
                let badgeClass = 'status-blocked';
                let badgeText = 'Bloqueado';
                if (client.active) {
                    badgeClass = 'status-active'; badgeText = 'Liberado';
                } else if (hasTrustUnlock) {
                    badgeClass = 'status-trust'; badgeText = 'Confiança 24h';
                }

                // Montagem dos botões
                let actionsHtml = `
                    <button onclick="toggleStatus('${client.client_id}', ${client.active})" class="action-btn ${client.active ? 'btn-block' : 'btn-unblock'}" title="${client.active ? 'Bloquear Definitivo' : 'Confirmar Pagamento'}">
                        <i class="fas ${client.active ? 'fa-lock' : 'fa-unlock'}"></i>
                    </button>
                `;

                // Botão "Aperto de Mão" (Confiança) - Só aparece se estiver bloqueado
                if (!client.active) {
                    actionsHtml += `
                    <button onclick="trustUnlock('${client.client_id}')" class="action-btn btn-trust" title="Liberar Confiança (24h)">
                        <i class="fas fa-handshake"></i>
                    </button>`;
                }

                actionsHtml += `
                    <button onclick="sendWhatsApp('${client.name}', '${client.phone}', '${dateStr}')" class="action-btn btn-wpp" title="Cobrar no WhatsApp"><i class="fab fa-whatsapp"></i></button>
                    <button onclick="openEdit('${client.client_id}', '${client.name}', '${client.phone || ''}', '${client.model}', ${client.value}, '${client.dueDate}')" class="action-btn btn-edit" title="Editar"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteClient('${client.client_id}')" class="action-btn btn-delete" title="Excluir"><i class="fas fa-trash"></i></button>
                `;

                const tr = document.createElement('tr');
                tr.style = rowStyle;
                tr.innerHTML = `
                    <td>
                        <b style="font-size: 1.1rem;">${client.name}</b><br>
                        <span style="font-size: 0.8rem; color: #94a3b8;"><span class="dot" style="background-color: ${dotColor};"></span>${statusText} | ID: ${client.client_id}</span>
                    </td>
                    <td>${financeText}</td>
                    <td><b style="color:${dateColor};">${dateStr}</b></td>
                    <td><span class="status-badge ${badgeClass}">${badgeText}</span></td>
                    <td><div style="display: flex; gap: 5px;">${actionsHtml}</div></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('dash-active').innerText = totalActive;
            document.getElementById('dash-fixed').innerText = `R$ ${totalFixed.toFixed(2)}`;
            document.getElementById('dash-var').innerText = `R$ ${totalVar.toFixed(2)}`;
        }

        // FUNÇÕES DO BANCO E API
        async function registerClient(e) {
            e.preventDefault();
            const data = {
                client_id: document.getElementById('client_id').value.trim().toLowerCase(),
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                model: document.getElementById('model').value,
                value: Number(document.getElementById('value').value),
                dueDate: document.getElementById('dueDate').value
            };
            await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            document.getElementById('registerForm').reset();
            loadClients();
        }

        async function toggleStatus(clientId, currentStatus) {
            await fetch('/api/toggle-status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ client_id: clientId, active: !currentStatus }) });
            loadClients();
        }

        // FUNÇÃO: DESBLOQUEIO DE CONFIANÇA
        async function trustUnlock(clientId) {
            if (confirm(`Liberar o sistema "${clientId}" temporariamente por 24 horas?`)) {
                await fetch('/api/trust-unlock', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ client_id: clientId, hours: 24 }) 
                });
                loadClients();
            }
        }

        async function deleteClient(clientId) {
            if (confirm(`Excluir permanentemente o sistema "${clientId}"?`)) {
                await fetch(`/api/clients/${clientId}`, { method: 'DELETE' });
                loadClients();
            }
        }

        function sendWhatsApp(name, phone, dueDate) {
            if (!phone || phone === 'undefined') { alert("Nenhum telefone cadastrado para este bar."); return; }
            const msg = `Olá, *${name}*! Tudo bem? 🎵\n\nPassando para informar que a fatura do sistema *PlayBar* (Vencimento: ${dueDate}) já está disponível.\n\nPara evitar a suspensão da tela, segue nossa chave PIX:\n*Chave PIX:* ${MINHA_CHAVE_PIX}\n\nQualquer dúvida, estamos à disposição!`;
            const url = `https://api.whatsapp.com/send?phone=55${phone}&text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        function openEdit(id, name, phone, model, value, dueDate) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_name').value = name;
            document.getElementById('edit_phone').value = phone !== 'undefined' ? phone : '';
            document.getElementById('edit_model').value = model;
            document.getElementById('edit_value').value = value;
            document.getElementById('edit_dueDate').value = dueDate;
            document.getElementById('editOverlay').style.display = 'flex';
        }

        function closeEdit() { document.getElementById('editOverlay').style.display = 'none'; }

        async function saveEdit() {
            const id = document.getElementById('edit_id').value;
            const data = {
                name: document.getElementById('edit_name').value,
                phone: document.getElementById('edit_phone').value,
                model: document.getElementById('edit_model').value,
                value: Number(document.getElementById('edit_value').value),
                dueDate: document.getElementById('edit_dueDate').value
            };
            await fetch(`/api/clients/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            closeEdit();
            loadClients();
        }
    </script>
</body>
</html>
